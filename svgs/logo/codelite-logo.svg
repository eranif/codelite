  <!--
    C — drawn as a thick arc stroke so every curve is naturally smooth.

    Centre (256, 256).
    Path ellipse: rx=100, ry=150 → slightly portrait (height > width), not oval.
    Stroke-width=82 → outer ring edge = 141 from centre, inner = 59.
    Opening angle: ±35° from the right horizontal.

    cos35°=0.8192, sin35°=0.5736
    Start (top gap edge): (256 + 100×0.8192,  256 − 150×0.5736) = (338, 170)
    End   (btm gap edge): (338, 342)

    large-arc=1, sweep=0 → goes CCW (left and around) from top to bottom.
    stroke-linecap="butt" → clean flat terminal cuts, like a typeface C.
  -->
