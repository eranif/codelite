<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 512 512"
   width="512"
   height="512"
   version="1.1"
   id="svg16"
   sodipodi:docname="codelite-logo-brackets.svg"
   inkscape:version="1.4 (86a8ad7, 2024-10-11)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview16"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="3.4648438"
     inkscape:cx="255.85569"
     inkscape:cy="256"
     inkscape:window-width="3840"
     inkscape:window-height="2036"
     inkscape:window-x="-12"
     inkscape:window-y="-12"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg16" />
  <defs
     id="defs12">
    <linearGradient
       id="bg"
       x1="0"
       y1="0"
       x2="1"
       y2="1">
      <stop
         offset="0%"
         stop-color="#181E30"
         id="stop1" />
      <stop
         offset="100%"
         stop-color="#0C1018"
         id="stop2" />
    </linearGradient>
    <radialGradient
       id="bgGlow"
       cx="48%"
       cy="48%"
       r="50%">
      <stop
         offset="0%"
         stop-color="#1B3060"
         stop-opacity="0.55"
         id="stop3" />
      <stop
         offset="100%"
         stop-color="#1B3060"
         stop-opacity="0"
         id="stop4" />
    </radialGradient>
    <!--
      Gold gradient for the C stroke, in absolute coords so it maps
      top-to-bottom across the actual C geometry.
    -->
    <linearGradient
       id="gold"
       gradientUnits="userSpaceOnUse"
       x1="256"
       y1="170"
       x2="256"
       y2="342">
      <stop
         offset="0%"
         stop-color="#F5A800"
         id="stop5" />
      <stop
         offset="50%"
         stop-color="#D97800"
         id="stop6" />
      <stop
         offset="100%"
         stop-color="#A84800"
         id="stop7" />
    </linearGradient>
    <!-- Top-left sheen overlay on the C -->
    <linearGradient
       id="sheen"
       gradientUnits="userSpaceOnUse"
       x1="156"
       y1="170"
       x2="340"
       y2="342">
      <stop
         offset="0%"
         stop-color="white"
         stop-opacity="0.22"
         id="stop8" />
      <stop
         offset="50%"
         stop-color="white"
         stop-opacity="0"
         id="stop9" />
    </linearGradient>
    <!-- Soft ambient glow behind the C -->
    <filter
       id="cGlow"
       x="-35%"
       y="-25%"
       width="170%"
       height="150%">
      <feGaussianBlur
         in="SourceGraphic"
         stdDeviation="14"
         result="blur"
         id="feGaussianBlur9" />
      <feComposite
         in="SourceGraphic"
         in2="blur"
         operator="over"
         id="feComposite9" />
    </filter>
    <!-- Drop shadow under the C -->
    <filter
       id="shadow"
       x="-0.22529461"
       y="-0.13551776"
       width="1.4295231"
       height="1.2710355">
      <feDropShadow
         dx="0"
         dy="0"
         stdDeviation="26"
         flood-color="black"
         flood-opacity="1" />
    </filter>
    <!-- Gloss bubble gradient: bright white center fading to transparent -->
    <radialGradient
       id="gloss"
       cx="50%"
       cy="40%"
       r="50%">
      <stop
         offset="0%"
         stop-color="white"
         stop-opacity="0.55"
         id="stop10" />
      <stop
         offset="60%"
         stop-color="white"
         stop-opacity="0.15"
         id="stop11" />
      <stop
         offset="100%"
         stop-color="white"
         stop-opacity="0"
         id="stop12" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect
     width="512"
     height="512"
     rx="80"
     fill="url(#bg)"
     id="rect12" />
  <rect
     width="512"
     height="512"
     rx="80"
     fill="url(#bgGlow)"
     id="rect13" />
  <rect
     x="1.5"
     y="1.5"
     width="509"
     height="509"
     rx="79"
     fill="none"
     stroke="rgba(255,255,255,0.06)"
     stroke-width="1.5"
     id="rect14" />
  <!--
    { left curly brace — brought closer to centre vs previous version
    Tips at x=148, arm at x=100, bump apex at x=72
  -->
  <!--
    C — drawn as a thick arc stroke so every curve is naturally smooth.

    Centre (256, 256).
    Path ellipse: rx=100, ry=150 → slightly portrait (height > width), not oval.
    Stroke-width=82 → outer ring edge = 141 from centre, inner = 59.
    Opening angle: ±35° from the right horizontal.

    cos35°=0.8192, sin35°=0.5736
    Start (top gap edge): (256 + 100×0.8192,  256 − 150×0.5736) = (338, 170)
    End   (btm gap edge): (338, 342)

    large-arc=1, sweep=0 → goes CCW (left and around) from top to bottom.
    stroke-linecap="butt" → clean flat terminal cuts, like a typeface C.
  -->
  <!-- Drop shadow layer -->
  <path
     d="M 338,170 A 100,150 0 1,0 338,342"
     fill="none"
     stroke="black"
     stroke-width="82"
     stroke-linecap="butt"
     opacity="0.85"
     filter="url(#shadow)"
     id="path14" />
  <!-- Main gold fill -->
  <path
     d="M 338,170 A 100,150 0 1,0 338,342"
     fill="none"
     stroke="url(#gold)"
     stroke-width="82"
     stroke-linecap="butt"
     id="path15" />
  <!-- Top-left sheen -->
  <path
     d="M 338,170 A 100,150 0 1,0 338,342"
     fill="none"
     stroke="url(#sheen)"
     stroke-width="82"
     stroke-linecap="butt"
     id="path16" />
  <!-- Gloss bubble: top-left corner of the icon -->
</svg>
