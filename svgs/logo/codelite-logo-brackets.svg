<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#181E30"/>
      <stop offset="100%" stop-color="#0C1018"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="48%" cy="48%" r="50%">
      <stop offset="0%" stop-color="#1B3060" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1B3060" stop-opacity="0"/>
    </radialGradient>

    <!--
      Gold gradient for the C stroke, in absolute coords so it maps
      top-to-bottom across the actual C geometry.
    -->
    <linearGradient id="gold" gradientUnits="userSpaceOnUse"
                    x1="256" y1="170" x2="256" y2="342">
      <stop offset="0%"   stop-color="#F5A800"/>
      <stop offset="50%"  stop-color="#D97800"/>
      <stop offset="100%" stop-color="#A84800"/>
    </linearGradient>

    <!-- Top-left sheen overlay on the C -->
    <linearGradient id="sheen" gradientUnits="userSpaceOnUse"
                    x1="156" y1="170" x2="340" y2="342">
      <stop offset="0%"  stop-color="white" stop-opacity="0.22"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Soft ambient glow behind the C -->
    <filter id="cGlow" x="-35%" y="-25%" width="170%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Drop shadow under the C -->
    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="26" flood-color="black" flood-opacity="1"/>
    </filter>

    <!-- Gloss bubble gradient: bright white center fading to transparent -->
    <radialGradient id="gloss" cx="50%" cy="40%" r="50%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect width="512" height="512" rx="80" fill="url(#bgGlow)"/>
  <rect x="1.5" y="1.5" width="509" height="509" rx="79"
        fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>

  <!--
    { left curly brace — brought closer to centre vs previous version
    Tips at x=148, arm at x=100, bump apex at x=72
  -->
  <!--
    C — drawn as a thick arc stroke so every curve is naturally smooth.

    Centre (256, 256).
    Path ellipse: rx=100, ry=150 → slightly portrait (height > width), not oval.
    Stroke-width=82 → outer ring edge = 141 from centre, inner = 59.
    Opening angle: ±35° from the right horizontal.

    cos35°=0.8192, sin35°=0.5736
    Start (top gap edge): (256 + 100×0.8192,  256 − 150×0.5736) = (338, 170)
    End   (btm gap edge): (338, 342)

    large-arc=1, sweep=0 → goes CCW (left and around) from top to bottom.
    stroke-linecap="butt" → clean flat terminal cuts, like a typeface C.
  -->

  <!-- Drop shadow layer -->
  <path d="M 338,170 A 100,150 0 1,0 338,342"
        fill="none"
        stroke="black" stroke-width="82" stroke-linecap="butt"
        opacity="0.85" filter="url(#shadow)"/>

  <!-- Main gold fill -->
  <path d="M 338,170 A 100,150 0 1,0 338,342"
        fill="none"
        stroke="url(#gold)" stroke-width="82" stroke-linecap="butt"/>

  <!-- Top-left sheen -->
  <path d="M 338,170 A 100,150 0 1,0 338,342"
        fill="none"
        stroke="url(#sheen)" stroke-width="82" stroke-linecap="butt"/>

  <!-- Gloss bubble: top-left corner of the icon -->
  <circle cx="75" cy="75" r="48" fill="url(#gloss)"/>
</svg>
